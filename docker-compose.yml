services:
  postgres:
    image: postgres:16-alpine
    container_name: payments_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment_service
    restart: unless-stopped
    ports:
      - '${PAYMENT_SERVICE_PORT}:8000'
    environment:
      - PORT=8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: payments_api
    restart: unless-stopped
    ports:
      - '${API_PORT}:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PAYMENT_SERVICE_URL: http://payment-service:8000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      payment-service:
        condition: service_healthy

volumes:
  postgres_data:
